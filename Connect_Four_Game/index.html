<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>connect-4-game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>

<body>
    <section id="header">
        <h1>4 <span>in</span> A ROW <span>CONNECT</span></h1>
    </section>
    <section id="playouts">
        <button id="playBot"><i class="fa-solid fa-robot"></i>Play with Bots</button>
        <button id="playPerson"><i class="fa-solid fa-user-group"></i>Play in Person</button>
    </section>
    <section>
        <div id="popup" class="popup">
            <div class="popup-box">
                <span id="closePopup">&times;</span>
                <h1>New Game</h1>
                <label>Player Name</label>
                <input type="text" id="player1Name" placeholder="Player 1">
                <h3>Select Avatar</h3>
                <div class="avatars">
                    <img src="images/avatar1.png" class="avatar1 active" data-avatar="images/avatar1.png">
                    <img src="images/avatar2.png" class="avatar1" data-avatar="images/avatar2.png">
                    <img src="images/avatar3.png" class="avatar1" data-avatar="images/avatar3.png">
                    <img src="images/avatar4.png" class="avatar1" data-avatar="images/avatar4.png">
                    <img src="images/avatar5.png" class="avatar1" data-avatar="images/avatar5.png">
                    <img src="images/avatar6.png" class="avatar1" data-avatar="images/avatar6.png">
                </div>
                <h3>Select Coin</h3>
                <div class="coin-buttons">
                    <button type="button" class="coin active" data-coin="red">
                        <img src="images/redcoin.png" alt="redcoin">
                    </button>
                    <button type="button" class="coin" data-coin="blue">
                        <img src="images/bluecoin.png" alt="bluecoin">
                    </button>
                </div>
                <div id="player2Box">
                    <label>Player 2 Name</label>
                    <input type="text" id="player2Name" placeholder="Player 2">
                    <h3>Select Avatar</h3>
                    <div class="avatars">
                        <img src="images/avatar1.png" class="avatar2" data-avatar="images/avatar1.png">
                        <img src="images/avatar2.png" class="avatar2 active" data-avatar="images/avatar2.png">
                        <img src="images/avatar3.png" class="avatar2" data-avatar="images/avatar3.png">
                        <img src="images/avatar4.png" class="avatar2" data-avatar="images/avatar4.png">
                        <img src="images/avatar5.png" class="avatar2" data-avatar="images/avatar5.png">
                        <img src="images/avatar6.png" class="avatar2" data-avatar="images/avatar6.png">
                    </div>
                </div>
                <div id="botBox">
                    <h3>Difficulty</h3>
                    <div class="difficulty-buttons">
                        <button type="button" class="difficulty active" data-level="Beginner">
                            Beginner
                        </button>
                        <button type="button" class="difficulty" data-level="Intermediate">
                            Intermediate
                        </button>
                        <button type="button" class="difficulty" data-level="Expert">
                            Expert
                        </button>
                    </div>
                </div>
                <button id="startGame">
                    Start Game
                </button>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
